<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Research Reader</title>
  <link rel="stylesheet" href="style.css?v=16">
  <link rel="stylesheet" href="lib/highlight-github.css">
</head>
<body>

<header class="top-bar">
  <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle sidebar">
    <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round">
      <line x1="3" y1="4.5" x2="15" y2="4.5"/>
      <line x1="3" y1="9" x2="15" y2="9"/>
      <line x1="3" y1="13.5" x2="15" y2="13.5"/>
    </svg>
  </button>
  <span class="top-bar-title" id="topBarTitle">AI Research Reader</span>
  <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">
    <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
    </svg>
    <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
    </svg>
  </button>
</header>

<div class="layout">
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-toolbar" id="sidebarToolbar">
      <button class="toolbar-btn" id="searchToggle" aria-label="Search in article">
        <svg width="15" height="15" viewBox="0 0 15 15" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="6.5" cy="6.5" r="4.5"/><line x1="10" y1="10" x2="13.5" y2="13.5"/>
        </svg>
      </button>
      <div class="toolbar-spacer"></div>
      <button class="toolbar-btn" id="pinToggle" aria-label="Pin sidebar">
        <svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9.5 2.5L13 6l-3.5 2L10 12l-2-2-2 2 .5-4L3 6l3.5-3.5L9.5 2.5z"/>
          <line x1="6.5" y1="12" x2="4" y2="14.5"/>
        </svg>
      </button>
    </div>
    <div class="sidebar-search-wrap" id="searchWrap" hidden>
      <input type="text" class="sidebar-search" id="sidebarSearch" placeholder="Search…">
      <button class="sidebar-search-clear" id="searchClear" aria-label="Clear search">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><line x1="3" y1="3" x2="9" y2="9"/><line x1="9" y1="3" x2="3" y2="9"/></svg>
      </button>
    </div>
    <div class="sidebar-panels" id="sidebarPanels">
      <div class="sidebar-screen" id="screenList">
        <div class="sidebar-header"><h2>Articles</h2></div>
        <ul class="article-list"></ul>
      </div>
      <div class="sidebar-screen" id="screenDetail">
        <div class="sidebar-detail-header">
          <button class="sidebar-back" id="sidebarBack" aria-label="Back to articles">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="10,3 5,8 10,13"/>
            </svg>
          </button>
          <span class="sidebar-detail-title" id="detailTitle"></span>
        </div>
        <div class="toc-section">
          <ul id="toc"></ul>
        </div>
      </div>
    </div>
    <div class="sidebar-resize" id="sidebarResize"></div>
  </nav>

  <main class="main">
    <div id="content"></div>
  </main>
</div>

<script src="lib/marked.min.js"></script>
<script src="lib/highlight.min.js"></script>
<script src="lib/mermaid.min.js"></script>
<script src="lib/app.js?v=16"></script>

</body>
</html>
